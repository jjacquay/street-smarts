name: CI

# Runs the pure-stdlib test suites on every push and PR. No dependencies to
# install — the Python geometry/data tests use only the standard library, and
# the Node email-generator test uses only Node built-ins (it extracts the
# email-gen logic straight out of index.html), so this stays fast and hermetic.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Corridor→district recompute tests
        run: python3 scripts/test_recompute_corridor_districts.py
      - name: Representative email scan tests
        run: python3 scripts/test_scan_representative_emails.py
      - name: District boundary discovery tests
        run: python3 scripts/test_fetch_district_boundaries.py
      - name: Email generator logic tests
        run: node scripts/test_email_generator.mjs
