name: Refresh district boundaries

# Discovers the county-commission and city-council district polygon layers
# (ArcGIS Online search + government ArcGIS services directories), validates
# them hard, and populates the corridor_districts block in
# data/representatives.json via the existing recompute tool.
#
# Runs on a GitHub-hosted runner because it needs open internet — the dev
# sandbox 403s every government/GIS host. Two modes:
#
#   * push / pull_request (paths below): PROBE — report-only. Discovery +
#     validation + a recompute dry-run; publishes the report as an artifact and
#     step summary. Writes nothing, opens nothing, always green (the report is
#     the product, even when it says "nothing found").
#   * workflow_dispatch: FULL — writes data/district_boundaries/*.geojson and
#     the recomputed corridor_districts, then opens a pull request for human
#     review. Optional county_url / city_url inputs bypass discovery when the
#     real layer endpoints are known (pass the layer URL, e.g.
#     https://…/MapServer/3 — no /query suffix).
#
# Never touches the roster or any verified flag — corridor_districts only.

on:
  workflow_dispatch:
    inputs:
      county_url:
        description: "Known county-commission districts layer URL (skips discovery)"
        required: false
      city_url:
        description: "Known city-council districts layer URL (skips discovery)"
        required: false
  push:
    branches-ignore: [main]
    paths:
      - scripts/fetch_district_boundaries.py
      - .github/workflows/refresh-districts.yml
  pull_request:
    paths:
      - scripts/fetch_district_boundaries.py
      - .github/workflows/refresh-districts.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  districts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Discover and validate district layers
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            ARGS="--report-only"
          fi
          if [ -n "${{ github.event.inputs.county_url }}" ]; then
            ARGS="$ARGS --county-url ${{ github.event.inputs.county_url }}"
          fi
          if [ -n "${{ github.event.inputs.city_url }}" ]; then
            ARGS="$ARGS --city-url ${{ github.event.inputs.city_url }}"
          fi
          python3 scripts/fetch_district_boundaries.py $ARGS --report district-discovery-report.md

      - name: Publish report to step summary
        if: always()
        run: cat district-discovery-report.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: district-discovery-report
          path: district-discovery-report.md

      - name: Open pull request with populated corridor_districts
        if: github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: district-refresh/${{ github.run_id }}
          title: "Populate corridor_districts from validated district boundaries"
          commit-message: "Populate corridor_districts from validated district boundary layers"
          body: |
            Automated district-boundary refresh (`refresh-districts.yml`).

            - Downloads validated county-commission + city-council district
              polygons (exact feature counts, per-feature in-range district
              field — validation details in the run's discovery report).
            - Populates `corridor_districts` in `data/representatives.json` via
              `scripts/recompute_corridor_districts.py` (fail-loud: orphan
              corridors or malformed layers abort before anything is written).
            - Commits the boundary GeoJSONs under `data/district_boundaries/`
              for reproducibility.

            **Review before merging:** spot-check a few corridors against the
            official district maps. This PR never changes the contact roster or
            any `verified` flag.
          add-paths: |
            data/representatives.json
            data/district_boundaries/*.geojson
